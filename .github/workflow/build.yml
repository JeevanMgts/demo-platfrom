name: Build and Push demo-platform

on:
  push:
    branches:
      - main
      - 'feature/**'   # optionally build feature branches too
  pull_request:

jobs:
  build-and-push:
    name: Build and Push JAR to GHCR
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Java
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      # Step 3: Build the library JAR
      - name: Build JAR
        run: mvn clean install -DskipTests

      # Step 4: Log in to GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 5: Build Docker image (optional, if you want to push a library image)
      - name: Build Docker image
        run: |
          docker build -t ghcr.io/jeevanmgts/demo-platform:latest .
        # Note: The Dockerfile must exist, but it won't run anything.

      # Step 6: Push Docker image to GHCR
      - name: Push Docker image
        run: |
          docker push ghcr.io/jeevanmgts/demo-platform:latest
